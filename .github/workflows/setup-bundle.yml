name: Setup Bundle

on:
  workflow_dispatch:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build setup bundle
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install archive tools
        run: sudo apt-get update && sudo apt-get install -y zip

      - name: Choose bundle version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            version="v0.0.0-pr-${{ github.event.pull_request.number }}"
          else
            version="v0.0.0-${GITHUB_RUN_ID}"
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Choose validation image refs
        id: images
        shell: bash
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          image="ghcr.io/${owner}/fastsell"
          {
            echo "api=${image}:api-sha-${GITHUB_SHA}"
            echo "web=${image}:web-sha-${GITHUB_SHA}"
            echo "system_agent=${image}:system-agent-sha-${GITHUB_SHA}"
          } >> "${GITHUB_OUTPUT}"

      - name: Build setup bundle
        run: |
          bash scripts/setup/create-setup-bundle.sh "${{ steps.version.outputs.version }}" \
            --api-image "${{ steps.images.outputs.api }}" \
            --web-image "${{ steps.images.outputs.web }}" \
            --system-agent-image "${{ steps.images.outputs.system_agent }}"

      - name: Upload setup bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fastsell-setup-${{ steps.version.outputs.version }}
          path: |
            dist/fastsell-setup-${{ steps.version.outputs.version }}.zip
            dist/fastsell-setup-${{ steps.version.outputs.version }}.tar.gz
          if-no-files-found: error
