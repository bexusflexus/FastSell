name: Setup Bundle

on:
  workflow_dispatch:
  pull_request:
  push:
    tags:
      - 'v*.*'

permissions:
  contents: read

jobs:
  build:
    name: Build setup bundle
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install archive tools
        run: sudo apt-get update && sudo apt-get install -y zip

      - name: Choose bundle version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME}"
          elif [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            version="v0.0.0-pr-${{ github.event.pull_request.number }}"
          else
            version="v0.0.0-${GITHUB_RUN_ID}"
          fi
          if [[ "${GITHUB_REF_TYPE}" == "tag" && ! "${version}" =~ ^v[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
            echo "Tag ${version} is not a supported setup bundle semver tag."
            exit 1
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Build setup bundle
        run: bash scripts/setup/create-setup-bundle.sh "${{ steps.version.outputs.version }}"

      - name: Upload setup bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fastsell-setup-${{ steps.version.outputs.version }}
          path: |
            dist/fastsell-setup-${{ steps.version.outputs.version }}.zip
            dist/fastsell-setup-${{ steps.version.outputs.version }}.tar.gz
          if-no-files-found: error

  release:
    name: Attach setup bundle to release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Choose bundle version
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME}" >> "${GITHUB_OUTPUT}"

      - name: Download setup bundle artifacts
        uses: actions/download-artifact@v4
        with:
          name: fastsell-setup-${{ steps.version.outputs.version }}
          path: dist

      - name: Attach setup bundle to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/fastsell-setup-${{ steps.version.outputs.version }}.zip
            dist/fastsell-setup-${{ steps.version.outputs.version }}.tar.gz
