name: Publish Images

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-images-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish ${{ matrix.component }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: api
            context: ./api
            file: ./api/Dockerfile
          - component: system-agent
            context: ./api
            file: ./api/Dockerfile.system-agent
          - component: web
            context: .
            file: ./docker/web.Dockerfile

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare tags
        id: meta
        shell: bash
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          image="ghcr.io/${owner}/fastsell"
          component="${{ matrix.component }}"
          tags="${image}:${component}-sha-${GITHUB_SHA}"

          if [[ "${GITHUB_REF_TYPE}" == "branch" ]]; then
            branch="${GITHUB_REF_NAME//\//-}"
            tags="${tags}"$'\n'"${image}:${component}-${branch}"
            if [[ "${GITHUB_REF_NAME}" == "main" ]]; then
              tags="${tags}"$'\n'"${image}:${component}-latest"
            fi
          fi

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tags="${tags}"$'\n'"${image}:${component}-${GITHUB_REF_NAME}"
          fi

          {
            echo "image=${image}"
            echo "tags<<EOF"
            echo "${tags}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=FastSell ${{ matrix.component }}
