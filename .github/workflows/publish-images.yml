name: Publish Images

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-images-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish ${{ matrix.component }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: api
            context: ./api
            file: ./api/Dockerfile
          - component: system-agent
            context: ./api
            file: ./api/Dockerfile.system-agent
          - component: web
            context: .
            file: ./docker/web.Dockerfile

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare tags
        id: meta
        shell: bash
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          image="ghcr.io/${owner}/fastsell"
          component="${{ matrix.component }}"
          tags="${image}:${component}-sha-${GITHUB_SHA}"

          {
            echo "image=${image}"
            echo "tags<<EOF"
            echo "${tags}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=FastSell ${{ matrix.component }}

  candidate-artifacts:
    name: Candidate setup bundle and manifest
    runs-on: ubuntu-latest
    needs: publish
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install archive tools
        run: sudo apt-get update && sudo apt-get install -y zip

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve candidate image digests
        id: digests
        shell: bash
        run: |
          set -euo pipefail
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          image="ghcr.io/${owner}/fastsell"
          api_ref="${image}:api-sha-${GITHUB_SHA}"
          web_ref="${image}:web-sha-${GITHUB_SHA}"
          system_agent_ref="${image}:system-agent-sha-${GITHUB_SHA}"

          api_digest="$(docker buildx imagetools inspect "${api_ref}" --format '{{.Manifest.Digest}}')"
          web_digest="$(docker buildx imagetools inspect "${web_ref}" --format '{{.Manifest.Digest}}')"
          system_agent_digest="$(docker buildx imagetools inspect "${system_agent_ref}" --format '{{.Manifest.Digest}}')"

          for digest in "${api_digest}" "${web_digest}" "${system_agent_digest}"; do
            if [[ ! "${digest}" =~ ^sha256:[0-9a-f]{64}$ ]]; then
              echo "Invalid image digest: ${digest}" >&2
              exit 1
            fi
          done

          {
            echo "api_ref=${api_ref}"
            echo "web_ref=${web_ref}"
            echo "system_agent_ref=${system_agent_ref}"
            echo "api_digest=${api_digest}"
            echo "web_digest=${web_digest}"
            echo "system_agent_digest=${system_agent_digest}"
          } >> "${GITHUB_OUTPUT}"

      - name: Build candidate setup bundle
        shell: bash
        run: |
          bash scripts/setup/create-setup-bundle.sh "candidate-${GITHUB_SHA}" \
            --api-image "${{ steps.digests.outputs.api_ref }}" \
            --web-image "${{ steps.digests.outputs.web_ref }}" \
            --system-agent-image "${{ steps.digests.outputs.system_agent_ref }}"

      - name: Generate candidate release manifest
        shell: bash
        run: |
          bash scripts/release/generate_release_manifest.sh \
            --kind candidate \
            --repo "${GITHUB_REPOSITORY}" \
            --source-sha "${GITHUB_SHA}" \
            --bundle-name "fastsell-setup-candidate-${GITHUB_SHA}" \
            --api-ref "${{ steps.digests.outputs.api_ref }}" \
            --api-digest "${{ steps.digests.outputs.api_digest }}" \
            --web-ref "${{ steps.digests.outputs.web_ref }}" \
            --web-digest "${{ steps.digests.outputs.web_digest }}" \
            --system-agent-ref "${{ steps.digests.outputs.system_agent_ref }}" \
            --system-agent-digest "${{ steps.digests.outputs.system_agent_digest }}" \
            --output "dist/fastsell-release-candidate-${GITHUB_SHA}.json"

      - name: Upload candidate artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fastsell-candidate-${{ github.sha }}
          path: |
            dist/fastsell-setup-candidate-${{ github.sha }}.zip
            dist/fastsell-setup-candidate-${{ github.sha }}.tar.gz
            dist/fastsell-release-candidate-${{ github.sha }}.json
          if-no-files-found: error
